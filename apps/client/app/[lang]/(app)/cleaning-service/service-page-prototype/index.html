<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Havenova | Service Page Prototype</title>
    <link rel="stylesheet" href="../global.css" />
    <link rel="stylesheet" href="styles/service-page.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <!-- Public Header context -->
    <main class="service-page-layout container">
      <header class="service-hero">
        <div class="service-hero__content">
          <span class="badge badge-primary">Cleaning Service</span>
          <h1
            class="section-title"
            style="margin-top: var(--space-sm); margin-bottom: var(--space-xs)"
          >
            Request a cleaning service
          </h1>
          <p class="section-subtitle" style="margin-bottom: var(--space-md)">
            Tell us a few details about your home and preferred schedule. We will review your
            request and get back to you.
          </p>

          <!-- Lista de beneficios (se oculta en móvil para no saturar) -->
          <ul class="service-hero__benefits hide-mobile">
            <li>
              <i class="fa-solid fa-check text-primary" style="margin-right: 8px"></i> Vetted &
              trained professionals
            </li>
            <li>
              <i class="fa-solid fa-check text-primary" style="margin-right: 8px"></i> Flexible
              scheduling
            </li>
            <li>
              <i class="fa-solid fa-check text-primary" style="margin-right: 8px"></i> Transparent
              pricing
            </li>
          </ul>
        </div>
        <div class="service-hero__media">
          <picture>
            <source media="(min-width: 993px)" srcset="../images/cleaning-hero-desktop.png" />
            <img
              src="../images/cleaning-hero-mobile.png"
              alt="Clean and organized living space"
              class="service-hero__image"
            />
          </picture>
        </div>
      </header>

      <div class="service-form-shell">
        <aside class="service-form-shell__steps" aria-label="Request progress">
          <div class="step-indicator" aria-label="Request progress"></div>
        </aside>

        <div class="service-form-shell__main card">
          <div data-step-navigation hidden></div>

          <div class="form-alert" aria-live="polite" data-form-alert>
            <p></p>
          </div>

          <section class="step-content" aria-labelledby="step-content-title">
            <h3 id="step-content-title" data-step-title class="step-content__title"></h3>
            <div class="step-content__body" data-step-content-body></div>
          </section>

          <footer class="step-actions" aria-label="Step actions">
            <button type="button" class="btn btn-secondary" data-step-back>Back</button>
            <button type="button" class="btn btn-primary" data-step-next>Next step</button>
          </footer>
        </div>
      </div>

      <div class="service-form-shell__helpers" hidden aria-hidden="true">
        <div class="review-placeholder" data-review-placeholder></div>
      </div>
    </main>

    <script src="scripts/service-page.js"></script>
  </body>
</html>
