name: Phase 1 CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: phase-1-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Node 22 and pnpm 10
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.24.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run recovered Jest suite
        run: pnpm test:contexts:ui

      - name: Typecheck client
        run: pnpm --filter @havenova/client exec tsc --noEmit --pretty false

      - name: Typecheck dashboard
        run: pnpm --filter @havenova/dashboard exec tsc --noEmit --pretty false

      - name: Typecheck worker
        run: pnpm --filter @havenova/worker exec tsc --noEmit --pretty false
